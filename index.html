<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>AI Web Design Agency | Custom Websites from $2,999 | Fast Delivery</title>
    <meta name="title" content="AI Web Design Agency | Custom Websites from $2,999 | Fast Delivery" />
    <meta name="description" content="Transform your brand with AI-powered web design. We create stunning, high-performance websites in days, not months. Custom sites starting at $2,999. Free consultation." />
    <meta name="keywords" content="AI web design, AI website builder, custom web design, web design agency, responsive website, SEO website, fast website, affordable web design, small business website, website redesign, mobile-first design, ecommerce website, landing page design, WordPress alternative, React development, full-stack development" />
    <meta name="author" content="AI Web Design Agency" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yourdomain.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:title" content="AI Web Design Agency | Custom Websites Powered by AI" />
    <meta property="og:description" content="Transform your brand with AI-powered web design. We create stunning, high-performance websites in weeks, not months." />
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://yourdomain.com/" />
    <meta property="twitter:title" content="AI Web Design Agency | Custom Websites Powered by AI" />
    <meta property="twitter:description" content="Transform your brand with AI-powered web design. We create stunning, high-performance websites in weeks, not months." />
    <meta property="twitter:image" content="https://yourdomain.com/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "AI Web Design Agency",
      "description": "AI-powered web design agency creating stunning, high-performance websites",
      "url": "https://yourdomain.com",
      "priceRange": "$$$",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "US"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": "English"
      },
      "serviceArea": {
        "@type": "Country",
        "name": "Worldwide"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Web Design Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Starter Website",
              "description": "5-page AI-generated site with responsive design"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Pro Website",
              "description": "Up to 15 pages with custom animations and CMS integration"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Enterprise Website",
              "description": "Custom web applications and AI integrations"
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
