<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bgGrad)"/>

  <!-- AI icon stylized -->
  <path d="M8 20 L14 10 L20 20" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="17" cy="14" r="1.5" fill="url(#accentGrad)"/>

  <!-- Sparkle/accent -->
  <path d="M22 18 L24 16 M24 18 L22 16" stroke="url(#accentGrad)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
